# Starship configuration - tuned for fast interactive startup.

format = "$username$hostname$directory$git_branch$git_status$cmd_duration$line_break$character"
add_newline = false
command_timeout = 150
scan_timeout = 30

[username]
style_user = "fg:white bold"
style_root = "fg:black bg:yellow bold"
format = "[$user]($style) "
show_always = false

[hostname]
ssh_only = true
format = "@[$hostname]($style) "
style = "bold dimmed fg:white"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[<](bold green)"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
read_only = " [ro]"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "git:"
style = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold red"
conflicted = "="
ahead = "^"
behind = "v"
diverged = "~"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = ">"
deleted = "x"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "fg:yellow"
