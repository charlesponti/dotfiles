# Starship configuration - tuned for fast interactive startup.

format = "$directory$git_branch$git_status$line_break$character"
add_newline = false
command_timeout = 100
scan_timeout = 20

[username]
disabled = true

[hostname]
disabled = true

[character]
success_symbol = "[❯](fg:250)"
error_symbol = "[❯](fg:250)"
vimcmd_symbol = "[❮](fg:245)"

[directory]
style = "fg:250"
truncation_length = 3
truncate_to_repo = true
read_only = " [ro]"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "・"
style = "fg:245"
format = "[$symbol$branch]($style) "

[git_status]
format = "[$staged$modified$untracked$renamed$deleted$conflicted$stashed$ahead_behind]($style) "
style = "fg:240"
conflicted = "=${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "*${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "x${count} "

[cmd_duration]
disabled = true
