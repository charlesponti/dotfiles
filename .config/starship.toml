# Starship configuration - tuned for fast interactive startup.

format = "$directory$git_branch$git_status$line_break$character"
add_newline = false
command_timeout = 100
scan_timeout = 20

[username]
disabled = true

[hostname]
disabled = true

[character]
success_symbol = "[❯](fg:250)"
error_symbol = "[❯](fg:250)"
vimcmd_symbol = "[❮](fg:245)"

[directory]
style = "fg:250"
truncation_length = 3
truncate_to_repo = true
read_only = " [ro]"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "・"
style = "fg:245"
format = "[$symbol$branch]($style) "

[git_status]
format = "[$staged$modified$untracked$renamed$deleted$conflicted$stashed$ahead_behind]($style) "
style = "fg:245"
conflicted = "[=${count}](fg:175) "
ahead = "[⇡${count}](fg:114) "
behind = "[⇣${count}](fg:117) "
diverged = "[⇕](fg:145)[⇡${ahead_count}](fg:114)[⇣${behind_count}](fg:117) "
untracked = "[?${count}](fg:110) "
stashed = "[*${count}](fg:139) "
modified = "[!${count}](fg:180) "
staged = "[+${count}](fg:108) "
renamed = "[»${count}](fg:146) "
deleted = "[x${count}](fg:174) "

[cmd_duration]
disabled = true
