# =============================================================================
# Tmux Keybindings Configuration
# Prefix: Ctrl+Space (instead of default Ctrl+b)
# 
# USAGE: Press Ctrl+Space, RELEASE, then press the command key
# Example: Ctrl+Space, then c = new window
# =============================================================================

# Unbind default prefix and set new one
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# -----------------------------------------------------------------------------
# Window Management
# -----------------------------------------------------------------------------

# Create new window
bind c new-window

# Next/Previous window
bind n next-window
bind p previous-window

# Choose window (interactive list)
bind w choose-tree -Zs

# Rename current window
bind , command-prompt -p "Rename window:" "rename-window '%%'"

# Kill current window
bind & kill-window

# Move window left/right
bind > swap-window -t +1
bind < swap-window -t -1

# Last window
bind b last-window

# -----------------------------------------------------------------------------
# Pane Navigation (Vim-style)
# -----------------------------------------------------------------------------

# Navigate panes with vim keys (after pressing prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alternative navigation with arrow keys
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# -----------------------------------------------------------------------------
# Pane Resizing (Vim-style with Shift)
# -----------------------------------------------------------------------------

# Resize panes
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# -----------------------------------------------------------------------------
# Pane Splitting (Keep working directory)
# -----------------------------------------------------------------------------

# Split pane vertically (left-right)
bind | split-window -h -c "#{pane_current_path}"

# Split pane horizontally (top-bottom)
bind - split-window -v -c "#{pane_current_path}"

# Break pane into window
bind ! break-pane -d

# Join window to pane
bind @ join-pane -t ! 

# -----------------------------------------------------------------------------
# Pane Management
# -----------------------------------------------------------------------------

# Toggle pane zoom
bind z resize-pane -Z

# Kill current pane
bind x kill-pane

# Display pane numbers
bind q display-panes

# Swap panes in a window
bind o swap-pane

# -----------------------------------------------------------------------------
# Session Management
# -----------------------------------------------------------------------------

# Choose session (interactive list)
bind s choose-tree -s

# Rename current session
bind $ command-prompt -p "Rename session:" "rename-session '%%'"

# Detach from session
bind d detach-client

# New session (with prompt for name)
bind C new-session

# Switch to previous session
bind ( switch-client -p

# Switch to next session
bind ) switch-client -n

# -----------------------------------------------------------------------------
# Copy Mode & Clipboard
# -----------------------------------------------------------------------------

# Enter copy mode
bind [ copy-mode

# Paste from buffer
bind ] paste-buffer

# Paste from selection (tmux-yank plugin)
bind P run "tmux paste-buffer -p"

# Copy mode vim-like navigation
unbind -T copy-mode-vi v
bind -T copy-mode-vi v send -X begin-selection
unbind -T copy-mode-vi y
bind -T copy-mode-vi y send -X copy-selection-and-cancel
unbind -T copy-mode-vi r
bind -T copy-mode-vi r send -X rectangle-toggle

# -----------------------------------------------------------------------------
# Configuration
# -----------------------------------------------------------------------------

# Reload tmux configuration
bind r source-file ~/.tmux.conf

# Show key bindings
bind ? list-keys

# -----------------------------------------------------------------------------
# Mouse Support
# -----------------------------------------------------------------------------

# Enable mouse mode
set -g mouse on

# -----------------------------------------------------------------------------
# Rotate window layout
bind Space next-layout
