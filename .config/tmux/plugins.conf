# Tmux Plugin Manager (TPM) Configuration
# Plugins are managed by TPM - install with prefix + I, update with prefix + U

# -----------------------------------------------------------------------------
# TPM Bootstrap
# -----------------------------------------------------------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'

# -----------------------------------------------------------------------------
# Core Plugins
# -----------------------------------------------------------------------------
# Sensible defaults for tmux (universal settings most users want)
set -g @plugin 'tmux-plugins/tmux-sensible'

# Better pane navigation and splitting (vim-style keys)
set -g @plugin 'tmux-plugins/tmux-pain-control'

# Persist and restore tmux sessions across restarts
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Automatically save and restore tmux sessions
set -g @plugin 'tmux-plugins/tmux-continuum'

# Improved copy-mode with system clipboard integration
set -g @plugin 'tmux-plugins/tmux-yank'

# Open URLs and files from tmux
set -g @plugin 'tmux-plugins/tmux-open'

# Visual feedback when prefix key is active
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# -----------------------------------------------------------------------------
# Theme - Catppuccin Mocha
# -----------------------------------------------------------------------------
set -g @plugin 'catppuccin/tmux'

# -----------------------------------------------------------------------------
# Plugin Configuration
# -----------------------------------------------------------------------------

# tmux-resurrect: Save vim/neovim session strategy
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum: Auto-restore and auto-save settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '60'
set -g @continuum-boot 'on'

# Catppuccin Theme Configuration
set -g @catppuccin_flavour 'mocha'

# Window styling
set -g @catppuccin_window_left_separator "█"
set -g @catppuccin_window_right_separator "█"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"

# Host display settings
set -g @catppuccin_host_only "off"

# Status bar left/right separators
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator " "

# -----------------------------------------------------------------------------
# TPM Initialization (MUST BE AT END OF CONFIG)
# -----------------------------------------------------------------------------
if-shell "[ -x ~/.tmux/plugins/tpm/tpm ]" "run '~/.tmux/plugins/tpm/tpm'"
