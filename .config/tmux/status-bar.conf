set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 15
set -g status-bg colour235
set -g status-fg colour223
set -g status-left-length 60
set -g status-right-length 200

set -g status-left "#[fg=colour232,bg=colour109,bold] #S #[fg=colour109,bg=colour235]▓▒░"
set -g window-status-format "#[fg=colour245,bg=colour235] #I: #W "
set -g window-status-current-format "#[fg=colour232,bg=colour243,bold] #I: #W "
set -g window-status-separator ""
set -g window-status-style "fg=colour245,bg=colour235"
set -g window-status-current-style "fg=colour232,bg=colour243,bold"
set -g window-status-activity-style "fg=colour109,bg=colour235"

set -g message-style "fg=colour223,bg=colour235"
set -g message-command-style "fg=colour223,bg=colour235"
set -g display-time 4000

set -g @git-status "#(git -C #{pane_current_path} branch 2>/dev/null | sed -n 's/^\* //p')"
set -g @git-dirty "#(cd #{pane_current_path} && git status --porcelain 2>/dev/null | head -c 1 | sed 's/.*/✗/;s/^$/✔/')"
set -g status-right "#[fg=colour223,bg=colour235] #[fg=colour250,bg=colour235]#{?#{pane_in_mode},#{mode_bg_color},}#{?client_prefix,#{prefix_highlight},} #[fg=colour235,bg=colour236]▓▒░ #[fg=colour250,bg=colour236]#{=30:@git-status}#{@git-dirty} #[fg=colour236,bg=colour235]▒░ #[fg=colour250,bg=colour235] #{battery_percentage} #{battery_icon} #[fg=colour235,bg=colour236]▒░ #[fg=colour250,bg=colour236] %Y-%m-%d %H:%M #[fg=colour245,bg=colour235] #h"

setw -g monitor-activity on
set -g visual-activity off
setw -g monitor-silence 0
setw -g monitor-bell off
setw -g automatic-rename on
setw -g automatic-rename-format "#{pane_current_command}"
setw -g clock-mode-colour colour109
setw -g clock-mode-style 24
set -g escape-time 0
