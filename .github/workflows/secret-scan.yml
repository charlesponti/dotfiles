name: Secret scan (gitleaks)

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    # Weekly scan
    - cron: '0 0 * * 0'

permissions:
  contents: read

jobs:
  gitleaks-scan:
    name: Run gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Docker available
        run: docker --version

      - name: Run gitleaks (detect)
        id: gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          WORKDIR="${{ github.workspace }}"
          REPORT="${WORKDIR}/gitleaks-report.json"
          echo "Running gitleaks container to scan repository (report -> ${REPORT})"
          # Run gitleaks in docker mounting the repository. Use --redact to avoid leaking secrets in output.
          docker run --rm -v "${WORKDIR}":/repo zricethezav/gitleaks:latest \
            detect --source /repo --report-format json --report-path /repo/gitleaks-report.json --redact -v || true

          echo "Report produced at: ${REPORT}"
          if [ ! -f "${REPORT}" ]; then
            echo "gitleaks did not produce a report file; marking job as failed."
            exit 2
          fi

          # Print a short summary (redacted). The JSON is an array; [] means no findings.
          cat "${REPORT}" | jq --color-output '.' || cat "${REPORT}"

          # Fail the job when any findings are present
          FINDINGS=$(jq 'length' "${REPORT}" || echo "0")
          echo "gitleaks findings: ${FINDINGS}"
          if [ "${FINDINGS}" -gt 0 ]; then
            echo "::error title=gitleaks::Secret scan found ${FINDINGS} potential leak(s). See artifact gitleaks-report.json for details (redacted)."
            exit 1
          fi

      - name: Upload gitleaks report (redacted)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

      - name: Done
        if: success()
        run: echo "gitleaks scan completed with no findings."
