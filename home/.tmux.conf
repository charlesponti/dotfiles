# =============================================================================
# Advanced Tmux Configuration
# 
# Prefix: Ctrl+Space (instead of default Ctrl+b)
# Theme: Catppuccin Mocha
# Plugins: TPM with 8 productivity plugins
# Integration: Ghostty auto-launch
# 
# Created for: charlesponti's dotfiles
# =============================================================================

# =============================================================================
# General Settings
# =============================================================================

# Prefix configuration
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Terminal settings
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Aggressive resize can cause visual churn in some terminals
set -g aggressive-resize off

# Base index for windows and panes (start at 1, not 0)
set -g base-index 1
set -g pane-base-index 1

# Status bar refresh
set -g status-interval 15

# Focus events can be noisy depending on terminal integration
set -g focus-events off

# Escape time (for vim compatibility)
set -g escape-time 0

# History limit
set -g history-limit 50000

# =============================================================================
# Mouse Support
# =============================================================================

# Enable mouse mode
set -g mouse on

# Enable mouse support (for older tmux versions)
bind m set -g mouse on
bind M set -g mouse off

# =============================================================================
# Window & Pane Management
# =============================================================================

# Automatically rename windows based on running command
setw -g automatic-rename on
setw -g automatic-rename-format "#{pane_current_command}"

# Renumber windows when one is closed
set -g renumber-windows on

# Don't rename windows automatically (alternative)
# setw -g automatic-rename off

# Display pane numbers
set -g display-panes-time 1000
set -g display-panes-colour colour166

# =============================================================================
# Visual Style
# =============================================================================

# Clock mode
setw -g clock-mode-colour colour109
setw -g clock-mode-style 24

# Message styling
set -g message-style "fg=colour232,bg=colour109,bold"
set -g message-command-style "fg=colour232,bg=colour109,bold"

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=colour109,bg=colour235"

# Bell notifications
setw -g monitor-bell off
setw -g window-status-bell-style "fg=colour232,bg=colour167,bold"

# =============================================================================
# Copy Mode
# =============================================================================

# Use vim key bindings in copy mode
setw -g mode-keys vi

# Copy mode styling
setw -g mode-style "fg=colour232,bg=colour109"

# =============================================================================
# Session Management
# =============================================================================

# Don't exit from tmux when closing a shell
set -g remain-on-exit off

# =============================================================================
# Key Binding Options
# =============================================================================

# Don't display the startup message
set -g set-clipboard off

# Keep passthrough off for stable terminal input behavior
set -g allow-passthrough off

# =============================================================================
# Performance
# =============================================================================

# Disable automatic window title updates (improves performance)
# set -g status off

# Reduce status bar updates
set -g status-interval 15

# Use synchronous updates (can help with laggy terminals)
# set -g synchronize-panes off

# =============================================================================
# Source Modular Configuration Files
# =============================================================================

# Source keybindings (must come early)
if-shell "[ -f ~/.dotfiles/.config/tmux/keybinds.conf ]" "source-file ~/.dotfiles/.config/tmux/keybinds.conf"

# Source status bar configuration
if-shell "[ -f ~/.dotfiles/.config/tmux/status-bar.conf ]" "source-file ~/.dotfiles/.config/tmux/status-bar.conf"

# Source plugins (must come last)
if-shell "[ -f ~/.dotfiles/.config/tmux/plugins.conf ]" "source-file ~/.dotfiles/.config/tmux/plugins.conf"

# =============================================================================
# Custom User Settings
# =============================================================================

# Load user-specific overrides (optional)
# if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"

# =============================================================================
# End of Configuration
# =============================================================================
