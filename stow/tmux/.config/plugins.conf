# =============================================================================
# Tmux Plugins Configuration
# =============================================================================

# TPM path
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# -----------------------------------------------------------------------------
# Plugin Manager
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'

# -----------------------------------------------------------------------------
# Core Plugins
# -----------------------------------------------------------------------------

# Sensible defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Pane navigation (vim-style)
set -g @plugin 'tmux-plugins/tmux-pain-control'

# Session persistence (save/restore)
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Auto-save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'

# Copy mode with clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# Open URLs/files
set -g @plugin 'tmux-plugins/tmux-open'

# Prefix highlight indicator
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# -----------------------------------------------------------------------------
# Theme: Catppuccin Mocha
# -----------------------------------------------------------------------------

set -g @plugin 'catppuccin/tmux'

# Theme configuration
set -g @catppuccin_flavour 'mocha'

# Window styling
set -g @catppuccin_window_left_separator "█"
set -g @catppuccin_window_right_separator "█"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_current_fill "number"

# Status bar
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator " "

# Enable status bar modules
set -g @catppuccin_enable_statusbar_icon "no"

# -----------------------------------------------------------------------------
# Plugin Settings
# -----------------------------------------------------------------------------

# tmux-resurrect
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum (auto-restore sessions)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @continuum-boot 'off'

# tmux-prefix-highlight
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=colour232,bg=colour109,bold'

# -----------------------------------------------------------------------------
# TPM Initialization (MUST BE LAST)
# -----------------------------------------------------------------------------

if-shell "[ -x ~/.tmux/plugins/tpm/tpm ]" "run '~/.tmux/plugins/tpm/tpm'"

# =============================================================================
# End
# =============================================================================
