# =============================================================================
# Tmux Keybindings
# Prefix: Ctrl+Space
# =============================================================================

# -----------------------------------------------------------------------------
# Windows
# -----------------------------------------------------------------------------

bind c new-window
bind n next-window
bind p previous-window
bind l last-window
bind w choose-tree -Zs
bind , command-prompt -p "Rename window:" "rename-window '%%'"
bind & kill-window

# Swap windows
bind-key -r < swap-window -t -1\; select-window -t -1
bind-key -r > swap-window -t +1\; select-window -t +1

# Faster switching
bind-key -n M-H previous-window
bind-key -n M-L next-window

# -----------------------------------------------------------------------------
# Panes - Navigation (Vim-style)
# -----------------------------------------------------------------------------

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Arrow keys as backup
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# -----------------------------------------------------------------------------
# Panes - Resize
# -----------------------------------------------------------------------------

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -----------------------------------------------------------------------------
# Panes - Split
# -----------------------------------------------------------------------------

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# -----------------------------------------------------------------------------
# Panes - Other
# -----------------------------------------------------------------------------

bind z resize-pane -Z
bind x kill-pane
bind q display-panes
bind o swap-pane
bind ! break-pane -d
bind @ join-pane -t !

# -----------------------------------------------------------------------------
# Sessions
# -----------------------------------------------------------------------------

bind d detach-client
bind S run-shell "$HOME/bin/functions/tmux-init/session-management.sh"
bind s choose-tree -s
bind $ command-prompt -p "Rename session:" "rename-session '%%'"
bind C new-session

# Session navigation
bind ( switch-client -p
bind ) switch-client -n

# -----------------------------------------------------------------------------
# Copy Mode
# -----------------------------------------------------------------------------

bind [ copy-mode
bind ] paste-buffer

# Vim-like selection in copy mode
unbind -T copy-mode-vi v
bind -T copy-mode-vi v send -X begin-selection

unbind -T copy-mode-vi y
bind -T copy-mode-vi y send -X copy-selection-and-cancel

unbind -T copy-mode-vi r
bind -T copy-mode-vi r send -X rectangle-toggle

# -----------------------------------------------------------------------------
# Config & Discovery
# -----------------------------------------------------------------------------

bind r source-file ~/.tmux.conf
bind ? list-keys
bind Space next-layout

# Explicit which-key toggle (if using tmux-which-key plugin)
# (plugin activates automatically on prefix, but can be bound explicitly too)

# Extract URLs from scrollback and open with fzf
bind u run-shell 'tmux capture-pane -p -S -100 | grep -oE "https?://[^[:space:]]+" | sort -u | fzf --reverse | xargs open' || true

# Text selection/hints (tmux-fingers activates with Shift+F, but available here)
# bind f capture-pane -p -J -S -100 | tmux-fingers

# Quick search in pane history
bind / copy-mode \; send-keys -X search-forward

# Grep through pane (using $HOME/bin if available)
bind G run-shell 'tmux capture-pane -p | fzf' || true

# -----------------------------------------------------------------------------
# End
# -----------------------------------------------------------------------------
