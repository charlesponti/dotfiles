# =============================================================================
# Tmux Plugins Configuration
# =============================================================================

# TPM path (can also be kept local to tmux config)
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins"

# -----------------------------------------------------------------------------
# TPM Auto Install
# -----------------------------------------------------------------------------

if-shell "! [ -d ~/.tmux/plugins/tpm ]" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# -----------------------------------------------------------------------------
# Plugin Manager
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'

# -----------------------------------------------------------------------------
# Core Plugins
# -----------------------------------------------------------------------------

# Sensible defaults
set -g @plugin 'tmux-plugins/tmux-sensible'

# Pane navigation (vim-style)
set -g @plugin 'tmux-plugins/tmux-pain-control'

# Session persistence (save/restore)
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Auto-save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'

# Copy mode with clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# Open URLs/files
set -g @plugin 'tmux-plugins/tmux-open'

# Prefix highlight indicator
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Keyboard shortcuts discovery (which-key style menu)
set -g @plugin 'alexwforsythe/tmux-which-key'

# Extract and search URLs via fzf
set -g @plugin 'd-becker/tmux-fzf-url'

# Easymotion-style text jumping
set -g @plugin 'Morantron/tmux-fingers'

# =============================================================================
# Theme: Custom Apple-Inspired Minimalist Design
# Full control via status-bar.conf (no theme plugins)
# =============================================================================

# =============================================================================
# Plugin Settings
# =============================================================================----------------------------------------------------------------------

# tmux-resurrect
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum (auto-restore sessions)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @continuum-boot 'on'  # automatically restore on server start

# tmux-prefix-highlight
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=colour232,bg=colour109,bold'

# tmux-which-key
set -g @which-key-sort 'off'
set -g @which-key-vertical 'true'
set -g @which-key-width '100'

# tmux-fingers customization
set -g @fingers-hint-format "#[fg=yellow,bold][%s]"
set -g @fingers-selected-hint-format "#[fg=yellow,bold,reverse][%s]"

# tmux-fzf-url customization
set -g @fzf-url-fzf-options "-w 90%"

# -----------------------------------------------------------------------------
# TPM Initialization (MUST BE LAST)
# -----------------------------------------------------------------------------

if-shell "[ -x ~/.tmux/plugins/tpm/tpm ]" "run '~/.tmux/plugins/tpm/tpm'"

# =============================================================================
# End
# =============================================================================
