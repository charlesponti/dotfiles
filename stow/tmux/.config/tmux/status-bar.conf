# =============================================================================
# Tmux Status Bar Configuration
# Apple-Inspired Minimalist Theme (Custom)
# Design Principles: Whitespace, Subtle Typography, Native Apple Aesthetic
# =============================================================================

# Status bar essentials
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-left-length 50
set -g status-right-length 50

# =============================================================================
# Colors: Apple's Gray Scale & Minimalist Palette
# =============================================================================
# Background: Nearly black (#1d1d1d for dark, mimics macOS System Gray)
# Foreground: Light gray (#f5f5f7 - Apple's light gray)
# Accent: Subtle blue (#007AFF - Apple blue for active)
# Inactive: Medium gray (#a1a1a6 - Apple medium gray)

set -g status-bg '#1d1d1d'                # Dark background (native macOS)
set -g status-fg '#f5f5f7'                # Light text (Apple's design)

# =============================================================================
# Window Status Styling (Minimal, Clean)
# =============================================================================

# Current window: Subtle highlight, no box, just text + color
setw -g window-status-current-format '#{window_index}:#{window_name}'
setw -g window-status-current-style 'fg=#007AFF,bg=#1d1d1d,bold'

# Inactive windows: Muted gray with no decoration
setw -g window-status-format '#{window_index}:#{window_name}'
setw -g window-status-style 'fg=#a1a1a6,bg=#1d1d1d'

# Activity/Bell: Subtle emphasis only
setw -g window-status-activity-style 'fg=#f5f5f7,bg=#1d1d1d,bold'
setw -g window-status-bell-style 'fg=#ff9500,bg=#1d1d1d,bold'

# =============================================================================
# Status Layout: Extremely Clean
# =============================================================================
# Left: Session name (minimal)
# Center: Window list (undecorated)
# Right: Time in 24-hour format (Apple style)

set -g status-left '#[fg=#f5f5f7,bg=#1d1d1d] #{session_name} #[default]'
set -g status-right '#[fg=#a1a1a6] %H:%M #[default]'

# =============================================================================
# Activity Monitoring
# =============================================================================

setw -g monitor-activity on
set -g visual-activity off
setw -g monitor-bell off
setw -g monitor-silence 0

# =============================================================================
# End
# =============================================================================
