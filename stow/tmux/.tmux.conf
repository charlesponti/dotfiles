# =============================================================================
# Tmux Configuration
# =============================================================================
# Prefix: Ctrl+Space
# Theme: Catppuccin Mocha (handled by plugin)
# =============================================================================

# =============================================================================
# Core Settings
# =============================================================================

# Prefix - Ctrl+Space (most popular modern choice)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Terminal
# use a portable terminfo entry; macOS doesn't include tmux-256color by default
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Increase scrollback buffer size
set -g history-limit 100000

# Focus events for vim plugins
set -g focus-events on

# Don't wait for escape sequence
set -sg escape-time 0

# Indices (start at 1, not 0)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# Performance
set -g status-interval 5

# =============================================================================
# Window Management
# =============================================================================

# Auto-rename windows to running command
setw -g automatic-rename on
# No custom format needed for standard behavior
# setw -g automatic-rename-format "#{pane_current_command}"

# =============================================================================
# Mouse Support
# =============================================================================

set -g mouse on

# =============================================================================
# Copy Mode (Vim-style)
# =============================================================================

setw -g mode-keys vi
setw -g copy-mode-match-style "fg=colour223,bg=colour235"
setw -g copy-mode-current-match-style "fg=colour232,bg=colour109,bold"

# =============================================================================
# Messages & Visual
# =============================================================================

set -g display-panes-time 1000
set -g display-time 4000
setw -g clock-mode-colour colour109
setw -g clock-mode-style 24

# =============================================================================
# Session Behavior
# =============================================================================

set -g remain-on-exit off
set -g detach-on-destroy on

# =============================================================================
# Source Modular Configs
# =============================================================================

# Define config directory for easier portability
TMUX_CONFIG_DIR="$HOME/.config/tmux"

# Keybindings first
if-shell "[ -f $TMUX_CONFIG_DIR/keybinds.conf ]" "source-file $TMUX_CONFIG_DIR/keybinds.conf"

# Status bar (minimal - Catppuccin handles theming)
if-shell "[ -f $TMUX_CONFIG_DIR/status-bar.conf ]" "source-file $TMUX_CONFIG_DIR/status-bar.conf"

# Plugins last
if-shell "[ -f $TMUX_CONFIG_DIR/plugins.conf ]" "source-file $TMUX_CONFIG_DIR/plugins.conf"

# =============================================================================
# End
# =============================================================================
