# =============================================================================
# Tmux Configuration
# =============================================================================
# Prefix: Ctrl+Space
# Theme: Catppuccin Mocha (handled by plugin)
# =============================================================================

# =============================================================================
# Core Settings
# =============================================================================

# Prefix - Ctrl+Space (most popular modern choice)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Indices (start at 1, not 0)
set -g base-index 1
set -g pane-base-index 1

# Performance
set -g escape-time 0
set -g history-limit 50000
set -g status-interval 15

# =============================================================================
# Window Management
# =============================================================================

# Auto-rename windows to running command
setw -g automatic-rename on
setw -g automatic-rename-format "#{pane_current_command}"

# Renumber windows when one closes
set -g renumber-windows on

# =============================================================================
# Mouse Support
# =============================================================================

set -g mouse on

# =============================================================================
# Copy Mode (Vim-style)
# =============================================================================

setw -g mode-keys vi
setw -g copy-mode-match-style "fg=colour223,bg=colour235"
setw -g copy-mode-current-match-style "fg=colour232,bg=colour109,bold"

# =============================================================================
# Messages & Visual
# =============================================================================

set -g display-panes-time 1000
set -g display-time 4000
setw -g clock-mode-colour colour109
setw -g clock-mode-style 24

# =============================================================================
# Session Behavior
# =============================================================================

set -g remain-on-exit off
set -g detach-on-destroy on

# =============================================================================
# Source Modular Configs
# =============================================================================

# Keybindings first
if-shell "[ -f ~/.dotfiles/.config/tmux/keybinds.conf ]" "source-file ~/.dotfiles/.config/tmux/keybinds.conf"

# Status bar (minimal - Catppuccin handles theming)
if-shell "[ -f ~/.dotfiles/.config/tmux/status-bar.conf ]" "source-file ~/.dotfiles/.config/tmux/status-bar.conf"

# Plugins last
if-shell "[ -f ~/.dotfiles/.config/tmux/plugins.conf ]" "source-file ~/.dotfiles/.config/tmux/plugins.conf"

# =============================================================================
# End
# =============================================================================
